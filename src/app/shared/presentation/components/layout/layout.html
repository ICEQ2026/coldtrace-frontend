@if (showDashboardShell()) {
  <app-dashboard-shell
    [activeOrganizationName]="activeOrganizationName()"
    [pageTitleKey]="pageTitleKey()"
    [profileUserName]="profileUserName()"
    [profileRoleLabelKey]="profileRoleLabelKey()"
    [canManageAccess]="canManageAccess()"
    [canManageUsers]="canManageUsers()"
    [canMonitorAssets]="canMonitorAssets()"
    [assetIssuesCount]="assetIssueCount()"
    [pendingAlertsCount]="pendingAlertsCount()"
    [organizationMembers]="organizationMembers()"
    [contextQueryParams]="dashboardContextQueryParams()"
    (signedOut)="logout()"
    (monthlyReportRequested)="downloadCurrentMonthReport()"
  >
    @if (dashboardContentReady()) {
      <router-outlet />
    } @else {
      <section class="dashboard-loading-state" aria-live="polite">
        {{ 'roles-permissions.feedback.loading' | translate }}
      </section>
    }
  </app-dashboard-shell>
} @else {
  @if (showLanguageSwitcher()) {
    <div class="language-switcher-bar">
      <app-language-switcher />
    </div>
  }
  <router-outlet />
}
