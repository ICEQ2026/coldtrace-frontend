name: Vercel Preview Link

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  deployments: write
  issues: write
  pull-requests: read
  statuses: write

jobs:
  publish-preview-link:
    name: Publish preview link
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub deployment
        uses: actions/github-script@v7
        env:
          VERCEL_PROJECT_SLUG: coldtrace-frontend
          VERCEL_TEAM_SLUG: mauricio-pajes-projects
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');

            const slugify = (value) =>
              value
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');

            const branchSlug = slugify(branch);
            const previewUrl = `https://${process.env.VERCEL_PROJECT_SLUG}-git-${branchSlug}-${process.env.VERCEL_TEAM_SLUG}.vercel.app`;
            const environment = `preview/${branch}`;

            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: context.sha,
              environment,
              description: `Vercel preview for ${branch}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
            });

            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: previewUrl,
              log_url: `https://vercel.com/${process.env.VERCEL_TEAM_SLUG}/${process.env.VERCEL_PROJECT_SLUG}`,
              description: 'Vercel branch preview URL',
            });

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: context.sha,
              state: 'success',
              target_url: previewUrl,
              description: 'Open Vercel branch preview',
              context: 'Vercel Preview',
            });

            await core.summary
              .addHeading('Vercel Preview')
              .addRaw(`Branch: \`${branch}\`\n\n`)
              .addRaw(`Preview: ${previewUrl}\n`)
              .write();

            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 1,
            });

            if (pulls.data.length === 0) {
              core.info(`No open PR found for ${branch}. Deployment link was still published.`);
              return;
            }

            const marker = '<!-- vercel-preview-link -->';
            const body = `${marker}
            ### Vercel Preview

            Branch \`${branch}\` is available at:

            ${previewUrl}
            `;

            const issue_number = pulls.data[0].number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.data.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
